# Pins the Rust toolchain for reproducible builds (CONVENTIONS §3).
# Using `stable` channel (currently 1.97.0). The effective MSRV is dictated by
# our dependency tree (currently ≥1.88 due to time, home, icu crates).
# A precise MSRV will be declared once dependency versions are locked.
[toolchain]
channel = "stable"
components = ["rustfmt", "clippy"]
# Cross targets used by release.yml (CONVENTIONS §14). Contributors on a single
# platform don't need these installed; CI adds them per matrix leg.
# targets = [
#   "x86_64-unknown-linux-gnu",
#   "x86_64-unknown-linux-musl",
#   "aarch64-unknown-linux-gnu",
#   "x86_64-pc-windows-msvc",
#   "x86_64-apple-darwin",
#   "aarch64-apple-darwin",
# ]
profile = "default"
